# Production stack for the blt-infra DigitalOcean droplet (droplet-sfo Cloudflare
# Tunnel). Cloudflare terminates TLS; the cloudflared sidecar forwards tunnel
# traffic directly to the app on a private network — no host ports, no Caddy.
#
# Matches the blt-infra "DO Droplet Apps" pattern. The Terraform ingress rule
# must point at this app's service+port:  service = "http://poefissure:8080".
#
# Deploy (from /opt/poefissure on the droplet, as the deploy user):
#   docker compose -f docker-compose.prod.yml up -d --build
services:
  poefissure:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: poefissure
    env_file: app.env
    volumes:
      - poefissure-data:/data
    networks:
      - edge
    restart: unless-stopped

  # cloudflared reads TUNNEL_TOKEN from app.env (env_file passes values literally,
  # so no ${} interpolation — which would choke on the $ in the bcrypt hash).
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: poefissure-cloudflared
    command: tunnel run
    env_file: app.env
    depends_on:
      - poefissure
    networks:
      - edge
    restart: unless-stopped

volumes:
  poefissure-data:

# Shared external network so any droplet cloudflared replica (this app's or another
# app's, since they're HA replicas of the same tunnel) can reach the poefissure
# container by name. Every droplet app + its cloudflared must join this network.
# Created once on the droplet:  docker network create edge
networks:
  edge:
    external: true
